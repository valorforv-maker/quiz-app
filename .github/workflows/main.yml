name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Sorun çıkaran libtinfo5 ve ncurses5 paketlerini kaldırdım, 
          # modern Ubuntu için gerekli olanları ekledim.
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools

      - name: Build with Buildozer
        run: |
          # Buildozer'ın ilk çalışmada hata vermemesi için otomatik 'yes' diyoruz
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BilgiYarismasi-APK
          path: bin/*.apk
