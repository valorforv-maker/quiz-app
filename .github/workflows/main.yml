name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool pkg-config zlib1g-dev cmake \
            libffi-dev libssl-dev m4 libncurses5-dev libncursesw5-dev \
            libtinfo6 libncurses6 help2man

      - name: Fix Autoconf Macros
        run: |
          sudo cp /usr/share/aclocal/libtool.m4 /usr/share/autoconf/autoconf/
          sudo cp /usr/share/aclocal/ltoptions.m4 /usr/share/autoconf/autoconf/
          sudo cp /usr/share/aclocal/ltsugar.m4 /usr/share/autoconf/autoconf/
          sudo cp /usr/share/aclocal/ltversion.m4 /usr/share/autoconf/autoconf/
          sudo cp /usr/share/aclocal/lt~obsolete.m4 /usr/share/autoconf/autoconf/

      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools

      - name: Build with Buildozer
        run: |
          # ÖNEMLİ: Sistemdeki hatalı NDK yollarını temizliyoruz
          export ANDROID_NDK_HOME=""
          export ANDROID_NDK_ROOT=""
          
          # Lisansları onayla ve derlemeyi başlat
          yes | buildozer android debug
