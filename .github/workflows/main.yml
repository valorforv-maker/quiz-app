name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool pkg-config zlib1g-dev cmake \
            libffi-dev libssl-dev m4 libncurses5-dev libncursesw5-dev \
            libtinfo6 libncurses6

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools

      - name: Build with Buildozer
        run: |
          # 1. Android SDK klasörünü önceden oluşturup lisansları otomatik onaylıyoruz
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          # 2. Buildozer'ı çalıştırıyoruz. 
          # Beklenmedik lisans sorularını aşmak için 'yes' komutuyla besliyoruz.
          yes | buildozer android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BilgiYarismasi-APK
          path: bin/*.apk
