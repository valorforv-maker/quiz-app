name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # autoconf, automake ve m4 paketleri "autoreconf" hatasını çözer
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool pkg-config zlib1g-dev cmake \
            libffi-dev libssl-dev m4

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          # Cython 0.29.33 Pygame-ce için en kararlı sürümdür
          pip install buildozer cython==0.29.33 setuptools

      - name: Build with Buildozer
        run: |
          # 'yes' komutunu boru hattı (pipe) yerine buildozer'a doğrudan gönderiyoruz
          # Bu şekilde "Broken pipe" hatasının önüne geçeriz
          buildozer android debug || buildozer android debug
